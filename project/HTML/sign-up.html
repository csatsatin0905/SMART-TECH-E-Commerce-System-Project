<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/log-in,sign-up.css">
    <title>Document</title>
</head>
<body>
    
    <div class="container">

    <div class="left-panel">
      <img src="../categ/pictures/design.png"alt="Log-In design" class="rotate">
    </div>

    <div class="right-panel">

      <div class="login-box">

        <h2>Sign-Up</h2>
        <p>Welcome! Please register your account.</p>

        <form>
          <label for="username">User Name</label>
          <input type="email" id="username" placeholder="username@Email.com" >

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" >

          <button type="submit">Sign-Up</button>

          <div class="signup">
            <span>Already have account?</span>
            <a href="log-in.html">Log-In</a>
          </div>

        </form>

      </div>

    </div>

  </div>
</body>
</html>
