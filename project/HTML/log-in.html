<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Gradient Login Page</title>
  <link rel="stylesheet" href="../CSS/log-in,sign-up.css">
</head>

<body>

  <div class="container">

    <!-- Left Gradient Section -->
    <div class="left-panel">
      <img src="../categ/pictures/design.png" alt="Log-In design" class="rotate">
    </div>

    <div class="right-panel">

      <div class="login-box">

        <h2>Login</h2>
        <p>Welcome back! Please login to your account.</p>

        <form>
          <label for="username">User Name</label>
          <input type="email" id="username" placeholder="Username" >

          <label for="password">Password</label>
          <input type="password" id="Password" placeholder="••••••••" >

          <div class="options">
            <label>
              <input type="checkbox"> Remember Me
            </label>
            <a href="#">Forgot Password?</a>
          </div>
        
          <button type="submit">
            <a href="landingPage.html">Log-In</a>
          </button>

          <div class="signup">
            <span>New User?</span>
            <a href="sign-up.html">Signup</a>
          </div>

        </form>

      </div>

    </div>

  </div>

</body>

</html>
