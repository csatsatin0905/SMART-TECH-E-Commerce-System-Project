<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../Assets/CSS/log-sign--up.css">
    <title>Sign Up - Smart Tech</title>
</head>
<body>
    
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>

  <div class="container">

    <div class="left-panel">
      <div class="gloss-overlay"></div>
      <img src="../Assets/pictures/LoginSignup Picture.png" alt="Sign-Up design" class="rotate">
    </div>

    <div class="right-panel">
      <div class="login-box">

        <h1 class="store-name">Smart Tech</h1>

        <h2>Sign-Up</h2>
        <p>Welcome! Please register your account.</p>

        <form onsubmit="event.preventDefault(); window.location.href='log-in.html';">
          
          <label for="username">User Name</label>
          <input type="email" id="username" placeholder="username@Email.com" required>

          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>

          <button type="submit">Sign-Up</button>

          <div class="signup">
            <span>Already have account?</span>
            <a href="log-in.html">Log-In</a>
          </div>

        </form>

      </div>
    </div>

  </div>

</body>
</html>
